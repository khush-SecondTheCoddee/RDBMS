name: Package MiniDB Studio

on: [push]

jobs:
  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Create EXE
        # --noconsole: No black CMD window
        # --onefile: Just one single EXE file
        # --name: Resulting name of your software
        run: pyinstaller --noconsole --onefile --name "MiniDB_Studio_Pro" minidb.py

      - name: Upload Software
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Software
          path: dist/MiniDB_Studio_Pro.exe
