name: Build Windows EXE

on:
  push:
    branches: [ "main" ]  # Runs every time you push to the main branch
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # We must use Windows to build a Windows .exe

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile minidb.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MiniDB-Windows-EXE  # Name of the download zip
        path: dist/minidb.exe      # Path to the generated file
